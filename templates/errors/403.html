{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-container" style="padding: 3rem 2rem;">
                <h1 style="font-size: 5rem; color: #f39c12; font-weight: bold;">403</h1>
                <h2 class="mt-3 mb-3">Access Forbidden</h2>
                <p class="text-muted mb-4">
                    You don't have permission to access this resource.
                    If you believe this is a mistake, please contact the administrator.
                </p>
                
                <div class="mt-4">
                    <a href="{{ url_for('public.home') }}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <a href="{{ request.referrer or url_for('public.home') }}" class="btn btn-secondary btn-lg">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
