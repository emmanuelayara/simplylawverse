{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-container" style="padding: 3rem 2rem;">
                <h1 style="font-size: 5rem; color: #c0392b; font-weight: bold;">500</h1>
                <h2 class="mt-3 mb-3">Internal Server Error</h2>
                <p class="text-muted mb-4">
                    Something went wrong on our end. Our team has been notified and we're working to fix it.
                    Please try again later or contact support if the problem persists.
                </p>
                
                <div class="mt-4">
                    <a href="{{ url_for('public.home') }}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <a href="{{ url_for('contact.contact') }}" class="btn btn-warning btn-lg">
                        <i class="fas fa-envelope"></i> Contact Support
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
