{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-container" style="padding: 3rem 2rem;">
                <h1 style="font-size: 5rem; color: #9b59b6; font-weight: bold;">405</h1>
                <h2 class="mt-3 mb-3">Method Not Allowed</h2>
                <p class="text-muted mb-4">
                    The HTTP method used is not supported for this resource.
                    Please check the request method and try again.
                </p>
                
                <div class="mt-4">
                    <a href="{{ url_for('public.home') }}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <a href="{{ request.referrer or url_for('public.home') }}" class="btn btn-secondary btn-lg">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
