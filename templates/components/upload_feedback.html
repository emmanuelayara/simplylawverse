<!-- Upload Feedback Component - Include in submit_article.html and edit_article.html -->

<style>
    /* Toast Notifications */
    .toast-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 1050;
        max-width: 400px;
    }

    .toast {
        background: white;
        border-radius: 10px;
        padding: 1rem 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        animation: slideInRight 0.3s ease-out;
        min-width: 300px;
    }

    @keyframes slideInRight {
        from {
            opacity: 0;
            transform: translateX(400px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .toast.success {
        border-left: 4px solid #10b981;
    }

    .toast.success .toast-icon {
        color: #10b981;
    }

    .toast.error {
        border-left: 4px solid #ef4444;
    }

    .toast.error .toast-icon {
        color: #ef4444;
    }

    .toast.warning {
        border-left: 4px solid #f59e0b;
    }

    .toast.warning .toast-icon {
        color: #f59e0b;
    }

    .toast-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    .toast-content {
        flex: 1;
    }

    .toast-title {
        font-weight: 600;
        margin-bottom: 0.25rem;
        color: #1f2937;
    }

    .toast-message {
        font-size: 0.9rem;
        color: #6b7280;
        margin: 0;
    }

    .toast-close {
        background: none;
        border: none;
        color: #9ca3af;
        cursor: pointer;
        font-size: 1.25rem;
        padding: 0;
        flex-shrink: 0;
    }

    .toast-close:hover {
        color: #6b7280;
    }

    /* Loading States */
    .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .file-progress {
        display: none;
        margin-top: 1rem;
    }

    .file-progress.show {
        display: block;
    }

    .progress-bar-wrapper {
        background: #e5e7eb;
        border-radius: 10px;
        height: 8px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #2563eb);
        width: 0%;
        transition: width 0.3s ease;
    }

    .progress-text {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.5rem;
        text-align: center;
    }

    /* File Input Feedback */
    .file-input.error {
        border-color: #ef4444;
        background: #fef2f2;
    }

    .file-input.error .file-input-icon {
        color: #ef4444;
    }

    .file-input.success {
        border-color: #10b981;
        background: #f0fdf4;
    }

    .file-input.success .file-input-icon {
        color: #10b981;
    }

    /* Upload feedback messages */
    .upload-feedback {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 10px;
        display: none;
    }

    .upload-feedback.show {
        display: block;
    }

    .upload-feedback.success {
        background: #ecfdf5;
        border: 2px solid #6ee7b7;
        color: #047857;
    }

    .upload-feedback.error {
        background: #fef2f2;
        border: 2px solid #fecaca;
        color: #dc2626;
    }

    .upload-feedback.warning {
        background: #fffbeb;
        border: 2px solid #fcd34d;
        color: #b45309;
    }

    .upload-feedback i {
        margin-right: 0.5rem;
    }
</style>

<script>
    /**
     * Toast Notification System
     * Shows non-intrusive feedback messages for user actions
     */
    class Toast {
        constructor(type, title, message, duration = 5000) {
            this.type = type; // 'success', 'error', 'warning'
            this.title = title;
            this.message = message;
            this.duration = duration;
            this.create();
        }

        create() {
            // Get or create container
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            // Create toast element
            const toast = document.createElement('div');
            toast.className = `toast ${this.type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas fa-${this.getIcon()}"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${this.title}</div>
                    <p class="toast-message">${this.message}</p>
                </div>
                <button class="toast-close" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            `;

            container.appendChild(toast);

            // Close button
            toast.querySelector('.toast-close').addEventListener('click', () => {
                this.remove(toast);
            });

            // Auto remove
            setTimeout(() => {
                this.remove(toast);
            }, this.duration);

            return toast;
        }

        getIcon() {
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                warning: 'info-circle'
            };
            return icons[this.type] || 'info-circle';
        }

        remove(element) {
            element.style.animation = 'slideInRight 0.3s ease-out reverse';
            setTimeout(() => element.remove(), 300);
        }
    }

    /**
     * File Upload Handler with Progress Feedback
     */
    class FileUploadHandler {
        constructor(inputSelector, progressSelector) {
            this.input = document.querySelector(inputSelector);
            this.progressContainer = document.querySelector(progressSelector);
            
            if (this.input) {
                this.setupListeners();
            }
        }

        setupListeners() {
            this.input.addEventListener('change', (e) => this.handleFileSelect(e));
        }

        handleFileSelect(event) {
            const files = event.target.files;
            if (!files.length) return;

            const file = files[0];
            const feedback = this.validateFile(file);

            if (!feedback.valid) {
                new Toast('error', 'Upload Failed', feedback.message, 4000);
                this.showUploadFeedback(feedback.message, 'error');
                event.target.value = ''; // Clear input
                return;
            }

            // Show success feedback
            new Toast('success', 'File Selected', `${file.name} (${this.formatSize(file.size)})`, 3000);
            this.showUploadFeedback(`✓ ${file.name} ready for upload (${this.formatSize(file.size)})`, 'success');
        }

        validateFile(file) {
            const maxSize = 10 * 1024 * 1024; // 10MB
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'application/pdf', 
                                 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];

            if (file.size > maxSize) {
                return {
                    valid: false,
                    message: `File too large (${this.formatSize(file.size)} > 10MB)`
                };
            }

            if (!allowedTypes.includes(file.type)) {
                return {
                    valid: false,
                    message: 'File type not allowed. Use JPG, PNG, GIF, PDF, DOC, or DOCX'
                };
            }

            return { valid: true };
        }

        showUploadFeedback(message, type) {
            let feedback = this.input.parentElement.querySelector('.upload-feedback');
            if (!feedback) {
                feedback = document.createElement('div');
                feedback.className = 'upload-feedback';
                this.input.parentElement.appendChild(feedback);
            }
            
            feedback.className = `upload-feedback ${type} show`;
            feedback.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        }

        formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    }

    /**
     * Form Loading State Manager
     */
    class FormLoadingState {
        constructor(formSelector) {
            this.form = document.querySelector(formSelector);
            if (this.form) {
                this.setupListeners();
            }
        }

        setupListeners() {
            this.form.addEventListener('submit', (e) => this.handleSubmit(e));
        }

        handleSubmit(event) {
            const submitBtn = this.form.querySelector('button[type="submit"]');
            if (!submitBtn) return;

            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner"></span> Processing...`;

            // Re-enable after a timeout (in case form doesn't naturally submit)
            setTimeout(() => {
                if (submitBtn.disabled) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            }, 5000);
        }
    }

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize file upload handlers
        new FileUploadHandler('input[name="cover_image"]', '.file-progress');
        new FileUploadHandler('input[name="document"]', '.file-progress');

        // Initialize form loading states
        new FormLoadingState('form');

        // Handle form submission errors
        const forms = document.querySelectorAll('form');
        forms.forEach(form => {
            form.addEventListener('submit', function() {
                const submitBtn = this.querySelector('button[type="submit"]');
                if (submitBtn) {
                    submitBtn.disabled = true;
                }
            });
        });
    });
</script>
