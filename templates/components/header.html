<!-- Header/Navigation Component -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Top">
        <div class="flex justify-between items-center py-4">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="{{ url_for('public.home') }}" class="flex items-center space-x-2 hover:opacity-75 transition">
                    <!-- SVG Logo -->
                    <svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" class="text-law-blue">
                        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
                        <line x1="32" y1="12" x2="32" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="20" y1="20" x2="32" y2="44" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
                        <line x1="44" y1="20" x2="32" y2="44" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
                        <circle cx="20" cy="16" r="1.5" fill="currentColor" opacity="0.7"/>
                        <circle cx="44" cy="16" r="1.5" fill="currentColor" opacity="0.7"/>
                        <line x1="18" y1="52" x2="46" y2="52" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <div class="flex flex-col">
                        <span class="font-semibold text-lg text-law-dark">Simply Lawverse</span>
                        <span class="text-xs text-gray-500">Corporate Legal Services</span>
                    </div>
                </a>
            </div>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="{{ url_for('public.home') }}" class="text-gray-700 hover:text-law-blue font-medium">Home</a>
                <a href="{{ url_for('services.index') }}" class="text-gray-700 hover:text-law-blue font-medium">Services</a>
                <a href="{{ url_for('public.blog') }}" class="text-gray-700 hover:text-law-blue font-medium">Blog</a>
                <a href="{{ url_for('public.about') }}" class="text-gray-700 hover:text-law-blue font-medium">About</a>
                <a href="{{ url_for('bookings.index') }}" class="px-4 py-2 bg-law-blue text-white rounded hover:bg-opacity-90 transition">
                    Book Consultation
                </a>
            </div>
            
            <!-- Mobile Navigation Toggle -->
            <div class="md:hidden">
                <button id="mobile-menu-btn" class="text-gray-700 hover:text-law-blue" aria-label="Toggle menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Mobile Navigation Menu -->
        <div id="mobile-menu" class="md:hidden hidden pb-4 space-y-2">
            <a href="{{ url_for('public.home') }}" class="block px-4 py-2 text-gray-700 hover:bg-law-gray rounded">Home</a>
            <a href="{{ url_for('services.index') }}" class="block px-4 py-2 text-gray-700 hover:bg-law-gray rounded">Services</a>
            <a href="{{ url_for('public.blog') }}" class="block px-4 py-2 text-gray-700 hover:bg-law-gray rounded">Blog</a>
            <a href="{{ url_for('public.about') }}" class="block px-4 py-2 text-gray-700 hover:bg-law-gray rounded">About</a>
            <a href="{{ url_for('bookings.index') }}" class="block px-4 py-2 bg-law-blue text-white rounded hover:bg-opacity-90">
                Book Consultation
            </a>
        </div>
    </nav>
</header>

<script>
    document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
    });
</script>
